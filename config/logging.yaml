version: 1
disable_existing_loggers: False

formatters:
  simple:
    format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"

handlers:
  file_handler:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: logs/training.log

  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple

root:
  level: INFO
  handlers: [file_handler, console]